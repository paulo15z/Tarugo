<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Estoque{% endblock %} | Tarugo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .table-row:hover { background-color: #f8fafc; }
        .badge-ativa    { background:#dcfce7; color:#166534; }
        .badge-consumida{ background:#f1f5f9; color:#475569; }
        .badge-cancelada{ background:#fee2e2; color:#991b1b; }
        .badge-entrada  { background:#dbeafe; color:#1e40af; }
        .badge-saida    { background:#fee2e2; color:#991b1b; }
        .badge-ajuste   { background:#fef9c3; color:#854d0e; }
        .badge-transferencia { background:#ede9fe; color:#5b21b6; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<header class="bg-indigo-800 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <i class="fas fa-boxes text-2xl"></i>
            <h1 class="text-xl font-semibold tracking-tight">Estoque | Tarugo</h1>
        </div>
        <nav class="flex items-center gap-6 text-sm font-medium">
            <a href="{% url 'estoque-dashboard' %}" class="hover:text-indigo-200 transition-colors {% block nav_dashboard %}{% endblock %}">
                <i class="fas fa-gauge-high mr-1"></i> Dashboard
            </a>
            <a href="{% url 'estoque-produtos' %}" class="hover:text-indigo-200 transition-colors {% block nav_produtos %}{% endblock %}">
                <i class="fas fa-box mr-1"></i> Produtos
            </a>
            <a href="{% url 'estoque-movimentar' %}" class="hover:text-indigo-200 transition-colors {% block nav_movimentar %}{% endblock %}">
                <i class="fas fa-arrow-right-arrow-left mr-1"></i> Movimentar
            </a>
            <a href="{% url 'estoque-reservas' %}" class="hover:text-indigo-200 transition-colors {% block nav_reservas %}{% endblock %}">
                <i class="fas fa-bookmark mr-1"></i> Reservas
            </a>
        </nav>
        <div id="clock" class="text-sm"></div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-8 py-8">
    {% if messages %}
        {% for message in messages %}
        <div class="mb-6 px-5 py-4 rounded-xl border-l-4 text-sm font-medium
            {% if message.tags == 'success' %}bg-green-50 border-green-500 text-green-800
            {% elif message.tags == 'error' %}bg-red-50 border-red-500 text-red-800
            {% else %}bg-blue-50 border-blue-500 text-blue-800{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script>
    function tickClock() {
        const now = new Date();
        const el = document.getElementById('clock');
        if (el) el.textContent = now.toLocaleString('pt-BR');
    }
    setInterval(tickClock, 1000);
    tickClock();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
