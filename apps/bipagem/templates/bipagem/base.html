<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bipagem{% endblock %} | Tarugo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #d8d5cc;
      --border-strong: #a8a49a;
      --text: #1a1917;
      --text-muted: #6b6760;
      --accent: #c8401a;
      --accent-light: #fdf0ec;
      --green: #1a6b3a;
      --green-light: #edf7f1;
      --yellow: #b87a00;
      --yellow-light: #fef9ec;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--text); color: #fff; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
    .header-brand { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; display: flex; align-items: center; gap: 0.75rem; }
    .header-brand::before { content: ''; display: block; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
    .header-nav { display: flex; gap: 0.25rem; }
    .header-nav a { color: #aaa; text-decoration: none; font-size: 0.8rem; font-family: var(--mono); padding: 0.35rem 0.75rem; border-radius: 3px; transition: color 0.15s, background 0.15s; letter-spacing: 0.04em; }
    .header-nav a:hover, .header-nav a.active { color: #fff; background: rgba(255,255,255,0.1); }
    .page { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; border-radius: 4px; font-size: 0.82rem; font-weight: 500; cursor: pointer; text-decoration: none; border: 1px solid transparent; transition: all 0.15s; }
    .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
    .btn-primary:hover { background: #333; }
    .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 3px; font-size: 0.72rem; font-family: var(--mono); font-weight: 500; }
    .badge-pendente { background: var(--bg); color: var(--text-muted); }
    .badge-bipada { background: var(--green-light); color: var(--green); }
    .badge-concluida { background: var(--text); color: #fff; }
    .badge-cancelada { background: var(--accent-light); color: var(--accent); }
    .mono { font-family: var(--mono); }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<header>
  <div class="header-brand">Bipagem</div>
    <nav class="header-nav">
    <a href="{% url 'bipagem:index' %}" {% if request.resolver_match.url_name == 'index' %}class="active"{% endif %}>Scanner</a>
    <a href="{% url 'bipagem:pedidos' %}" {% if request.resolver_match.url_name == 'pedidos' %}class="active"{% endif %}>Pedidos</a>
    <a href="{% url 'integracoes:dashboard-discrepancias' %}" {% if request.resolver_match.url_name == 'dashboard-discrepancias' %}class="active"{% endif %}>Gêmeo Digital</a>
  </nav>
  <div class="header-user">
    {% if user.is_authenticated %}{{ user.username }}{% else %}—{% endif %}
  </div>
</header>
<main class="page">
  {% block content %}{% endblock %}
</main>
{% block extra_js %}{% endblock %}
</body>
</html>
