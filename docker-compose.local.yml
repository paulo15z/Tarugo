services:
  db:
    image: postgres:16-alpine
    container_name: tarugo_db_local
    environment:
      POSTGRES_DB: tarugo_local
      POSTGRES_USER: tarugo
      POSTGRES_PASSWORD: tarugo123
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarugo -d tarugo_local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_local_data:
